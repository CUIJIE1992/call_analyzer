services:
  - type: web
    name: call-analyzer
    env: python
    buildCommand: |
      apt-get update && apt-get install -y fonts-wqy-zenhei fonts-noto-cjk
      pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: RENDER
        value: "true"
